<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metronome — The Practice Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f5f0e8;
            --paper-dark: #ece4d0;
            --ink: #1a1510;
            --ink-muted: #7a6a56;
            --border: #c8b89a;
            --amber: #c8841a;
            --red: #8b2020;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Libre Baskerville', serif;
            background: var(--paper);
            color: var(--ink);
            padding: 1.25rem;
        }
        .section-label {
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 0.5rem;
            display: block;
        }

        /* BPM display */
        .bpm-display {
            text-align: center;
            margin-bottom: 1.25rem;
        }
        .bpm-number {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 900;
            color: var(--ink);
            line-height: 1;
        }
        .bpm-label {
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-top: 0.2rem;
        }

        /* Slider */
        .slider-row { margin-bottom: 1.25rem; }
        .slider-edge-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.68rem;
            color: var(--ink-muted);
            margin-top: 0.3rem;
        }
        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 2px;
            background: var(--ink);
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--ink);
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--ink);
            cursor: pointer;
            border: none;
        }

        /* Nudge + tap */
        .bpm-controls {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }
        .nudge-btn {
            flex: 1;
            padding: 0.45rem;
            background: none;
            border: 1px solid var(--border);
            color: var(--ink-muted);
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
        }
        .nudge-btn:hover { border-color: var(--ink); color: var(--ink); }
        .tap-btn {
            flex: 2;
            padding: 0.45rem;
            background: none;
            border: 1px solid var(--ink);
            color: var(--ink);
            font-family: 'Libre Baskerville', serif;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
        }
        .tap-btn:active { background: var(--paper-dark); }

        /* Sound presets */
        .sound-row { margin-bottom: 1.25rem; }
        .sound-options { display: flex; gap: 0.4rem; }
        .sound-btn {
            flex: 1;
            padding: 0.4rem 0.3rem;
            border: 1px solid var(--border);
            background: var(--paper);
            color: var(--ink-muted);
            font-family: 'Libre Baskerville', serif;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
            text-align: center;
        }
        .sound-btn:hover { border-color: var(--ink); color: var(--ink); }
        .sound-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

        /* Start/stop */
        .start-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--ink);
            color: var(--paper);
            border: 2px solid var(--ink);
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .start-btn:hover { background: var(--amber); border-color: var(--amber); color: var(--ink); }
        .start-btn.running { background: var(--red); border-color: var(--red); color: var(--paper); }
        .start-btn.running:hover { background: #6e1818; border-color: #6e1818; }
    </style>
</head>
<body>

    <div class="bpm-display">
        <div class="bpm-number" id="bpmNumber">120</div>
        <div class="bpm-label">BPM</div>
    </div>

    <div class="slider-row">
        <span class="section-label">Tempo</span>
        <input type="range" id="bpmSlider" min="40" max="240" value="120" step="1">
        <div class="slider-edge-row"><span>40</span><span>240</span></div>
    </div>

    <div class="bpm-controls">
        <button class="nudge-btn" id="nudgeDown5">− 5</button>
        <button class="nudge-btn" id="nudgeDown">− 1</button>
        <button class="tap-btn" id="tapBtn">Tap</button>
        <button class="nudge-btn" id="nudgeUp">+ 1</button>
        <button class="nudge-btn" id="nudgeUp5">+ 5</button>
    </div>

    <div class="sound-row">
        <span class="section-label">Click Sound</span>
        <div class="sound-options">
            <button class="sound-btn active" data-sound="click">Click</button>
            <button class="sound-btn" data-sound="wood">Wood</button>
            <button class="sound-btn" data-sound="hihat">Hi-Hat</button>
            <button class="sound-btn" data-sound="beep">Beep</button>
        </div>
    </div>

    <button class="start-btn" id="startBtn">Start</button>

<script>
    let bpm = 120;
    let isRunning = false;
    let intervalId = null;
    let audioCtx = null;
    let currentSound = 'click';
    let tapTimes = [];

    function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }

    function click() {
        const ctx = getAudioCtx();
        const now = ctx.currentTime;
        const gain = ctx.createGain();
        gain.connect(ctx.destination);

        if (currentSound === 'click') {
            const osc = ctx.createOscillator();
            osc.connect(gain);
            osc.frequency.value = 1000;
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
            osc.start(now); osc.stop(now + 0.04);

        } else if (currentSound === 'wood') {
            const osc = ctx.createOscillator();
            osc.connect(gain);
            osc.type = 'square';
            osc.frequency.value = 400;
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
            osc.start(now); osc.stop(now + 0.06);

        } else if (currentSound === 'hihat') {
            const bufferSize = ctx.sampleRate * 0.08;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const source = ctx.createBufferSource();
            source.buffer = buffer;
            const filter = ctx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 7000;
            source.connect(filter);
            filter.connect(gain);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            source.start(now); source.stop(now + 0.08);

        } else if (currentSound === 'beep') {
            const osc = ctx.createOscillator();
            osc.connect(gain);
            osc.type = 'sine';
            osc.frequency.value = 720;
            gain.gain.setValueAtTime(0.35, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        }
    }

    function setBpm(val) {
        bpm = Math.min(240, Math.max(40, val));
        document.getElementById('bpmNumber').textContent = bpm;
        document.getElementById('bpmSlider').value = bpm;
        if (isRunning) { stopMetronome(); startMetronome(); }
    }

    let nextTickTime = 0;

    function startMetronome() {
        const ctx = getAudioCtx();
        ctx.resume();
        isRunning = true;
        nextTickTime = ctx.currentTime;
        scheduler();
        document.getElementById('startBtn').textContent = 'Stop';
        document.getElementById('startBtn').classList.add('running');
    }

    function scheduler() {
        if (!isRunning) return;
        const ctx = getAudioCtx();
        const interval = 60 / bpm;
        // Schedule clicks slightly ahead using audio clock
        while (nextTickTime < ctx.currentTime + 0.1) {
            clickAt(nextTickTime);
            nextTickTime += interval;
        }
        intervalId = setTimeout(scheduler, 25);
    }

    function stopMetronome() {
        clearTimeout(intervalId);
        intervalId = null;
        isRunning = false;
        document.getElementById('startBtn').textContent = 'Start';
        document.getElementById('startBtn').classList.remove('running');
    }

    document.getElementById('bpmSlider').addEventListener('input', e => setBpm(parseInt(e.target.value)));
    document.getElementById('nudgeUp').onclick = () => setBpm(bpm + 1);
    document.getElementById('nudgeDown').onclick = () => setBpm(bpm - 1);
    document.getElementById('nudgeUp5').onclick = () => setBpm(bpm + 5);
    document.getElementById('nudgeDown5').onclick = () => setBpm(bpm - 5);

    document.getElementById('tapBtn').onclick = () => {
        const now = Date.now();
        tapTimes.push(now);
        if (tapTimes.length > 8) tapTimes.shift();
        if (tapTimes.length > 1) {
            if (now - tapTimes[0] > 3000) tapTimes = tapTimes.slice(-2);
            const intervals = [];
            for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
            const avg = intervals.reduce((a,b) => a+b, 0) / intervals.length;
            setBpm(Math.round(60000 / avg));
        }
    };

    document.querySelectorAll('.sound-btn').forEach(btn => {
        btn.onclick = () => {
            currentSound = btn.dataset.sound;
            document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
    });

    document.getElementById('startBtn').onclick = () => {
        isRunning ? stopMetronome() : startMetronome();
    };

    // URL params
    (function() {
        const params = new URLSearchParams(window.location.search);
        const bpmParam = params.get('bpm');
        if (bpmParam) setBpm(parseInt(bpmParam));
        const soundParam = params.get('sound');
        if (soundParam) {
            currentSound = soundParam;
            document.querySelectorAll('.sound-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.sound === soundParam);
            });
        }
    })();
</script>
</body>
</html>
