<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metronome — The Practice Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f5f0e8;
            --paper-dark: #ece4d0;
            --ink: #1a1510;
            --ink-muted: #7a6a56;
            --border: #c8b89a;
            --amber: #c8841a;
            --red: #8b2020;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Libre Baskerville', serif;
            background: var(--paper);
            color: var(--ink);
            padding: 1.25rem;
        }
        .section-label {
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 0.5rem;
            display: block;
        }

        /* BPM display */
        .bpm-display {
            text-align: center;
            margin-bottom: 1.25rem;
        }
        .bpm-number {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 900;
            color: var(--ink);
            line-height: 1;
        }
        .bpm-label {
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-top: 0.2rem;
        }

        /* Slider */
        .slider-row { margin-bottom: 1.25rem; }
        .slider-edge-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.68rem;
            color: var(--ink-muted);
            margin-top: 0.3rem;
        }
        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 2px;
            background: var(--ink);
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--ink);
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--ink);
            cursor: pointer;
            border: none;
        }

        /* Nudge + tap */
        .bpm-controls {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }
        .nudge-btn {
            flex: 1;
            padding: 0.45rem;
            background: none;
            border: 1px solid var(--border);
            color: var(--ink-muted);
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
        }
        .nudge-btn:hover { border-color: var(--ink); color: var(--ink); }
        .tap-btn {
            flex: 2;
            padding: 0.45rem;
            background: none;
            border: 1px solid var(--ink);
            color: var(--ink);
            font-family: 'Libre Baskerville', serif;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
        }
        .tap-btn:active { background: var(--paper-dark); }

        /* Sound presets */
        .sound-row { margin-bottom: 1.25rem; }
        .sound-options { display: flex; gap: 0.4rem; }
        .sound-btn {
            flex: 1;
            padding: 0.4rem 0.3rem;
            border: 1px solid var(--border);
            background: var(--paper);
            color: var(--ink-muted);
            font-family: 'Libre Baskerville', serif;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
            text-align: center;
        }
        .sound-btn:hover { border-color: var(--ink); color: var(--ink); }
        .sound-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

        /* Time signature & subdivision */
        .section-row { margin-bottom: 1.25rem; }
        .pill-options { display: flex; gap: 0.4rem; }
        .pill-options.wrap { flex-wrap: wrap; }
        .pill-btn {
            padding: 0.4rem 0.65rem;
            border: 1px solid var(--border);
            background: var(--paper);
            color: var(--ink-muted);
            font-family: 'Libre Baskerville', serif;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
            text-align: center;
        }
        .pill-options:not(.wrap) .pill-btn { flex: 1; }
        .pill-btn:hover { border-color: var(--ink); color: var(--ink); }
        .pill-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

        /* Tempo Ramp */
        .section-row { margin-bottom: 1.25rem; }
        .ramp-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .ramp-row label {
            font-family: 'Libre Baskerville', serif;
            font-size: 0.78rem;
            color: var(--ink-muted);
        }
        .ramp-row input[type="number"] {
            width: 70px;
            padding: 0.35rem 0.5rem;
            border: 1px solid var(--border);
            background: var(--paper);
            color: var(--ink);
            font-family: 'Libre Baskerville', serif;
            font-size: 0.8rem;
            text-align: right;
            border-radius: 2px;
        }
        .ramp-preview {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.75rem;
            color: var(--amber);
            margin-top: 0.5rem;
            min-height: 1.2em;
        }

        /* Start/stop */
        .start-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--ink);
            color: var(--paper);
            border: 2px solid var(--ink);
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .start-btn:hover { background: var(--amber); border-color: var(--amber); color: var(--ink); }
        .start-btn.running { background: var(--red); border-color: var(--red); color: var(--paper); }
        .start-btn.running:hover { background: #6e1818; border-color: #6e1818; }
    </style>
</head>
<body>

    <div class="bpm-display">
        <div class="bpm-number" id="bpmNumber">120</div>
        <div class="bpm-label">BPM</div>
    </div>

    <div class="slider-row">
        <span class="section-label">Tempo</span>
        <input type="range" id="bpmSlider" min="1" max="400" value="120" step="1">
        <div class="slider-edge-row"><span>1</span><span>400</span></div>
    </div>

    <div class="bpm-controls">
        <button class="nudge-btn" id="nudgeDown5">− 5</button>
        <button class="nudge-btn" id="nudgeDown">− 1</button>
        <button class="tap-btn" id="tapBtn">Tap</button>
        <button class="nudge-btn" id="nudgeUp">+ 1</button>
        <button class="nudge-btn" id="nudgeUp5">+ 5</button>
    </div>

    <div class="section-row">
        <span class="section-label">Time Signature</span>
        <div class="pill-options wrap" id="timeSigOptions">
            <button class="pill-btn active" data-beats="4" data-subdiv="1">4/4</button>
            <button class="pill-btn" data-beats="3" data-subdiv="1">3/4</button>
            <button class="pill-btn" data-beats="2" data-subdiv="1">2/4</button>
            <button class="pill-btn" data-beats="5" data-subdiv="1">5/4</button>
            <button class="pill-btn" data-beats="7" data-subdiv="1">7/8</button>
            <button class="pill-btn" data-beats="2" data-subdiv="3">6/8</button>
            <button class="pill-btn" data-beats="3" data-subdiv="3">9/8</button>
            <button class="pill-btn" data-beats="4" data-subdiv="3">12/8</button>
        </div>
        <div style="font-size:0.65rem;color:var(--ink-muted);font-style:italic;margin-top:0.35rem;">6/8, 9/8, and 12/8 set the beat count and triplet subdivision together — override either independently below if you want a different combination.</div>
        <label style="display:flex;align-items:center;gap:0.5rem;margin-top:0.6rem;cursor:pointer;">
            <input type="checkbox" id="accentToggle" checked style="accent-color:var(--amber);cursor:pointer;">
            <span style="font-size:0.78rem;color:var(--ink-muted);">Accent beat 1</span>
        </label>
    </div>

    <div class="section-row">
        <span class="section-label">Subdivision</span>
        <div class="pill-options" id="subdivOptions">
            <button class="pill-btn active" data-subdiv="1">Quarter</button>
            <button class="pill-btn" data-subdiv="2">Eighths</button>
            <button class="pill-btn" data-subdiv="3">Triplets</button>
            <button class="pill-btn" data-subdiv="4">Sixteenths</button>
        </div>
    </div>

    <div class="sound-row">
        <span class="section-label">Click Sound</span>
        <div class="sound-options">
            <button class="sound-btn active" data-sound="click">Click</button>
            <button class="sound-btn" data-sound="wood">Wood</button>
            <button class="sound-btn" data-sound="hihat">Hi-Hat</button>
            <button class="sound-btn" data-sound="beep">Beep</button>
        </div>
    </div>

    <div class="section-row">
        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;margin-bottom:0.6rem;">
            <input type="checkbox" id="rampToggle" style="accent-color:var(--amber);cursor:pointer;">
            <span class="section-label" style="margin-bottom:0;">Tempo Ramp</span>
        </label>
        <div id="rampControls" style="display:none;">
            <div class="ramp-row">
                <label for="rampTargetBpm">Target BPM</label>
                <input type="number" id="rampTargetBpm" min="1" max="400" value="160">
            </div>
            <div class="ramp-row">
                <label for="rampDuration">Over (minutes)</label>
                <input type="number" id="rampDuration" min="0.5" max="180" step="0.5" value="20">
            </div>
            <div class="ramp-row">
                <label for="rampStepSize">Step size (BPM)</label>
                <input type="number" id="rampStepSize" min="1" max="50" value="5">
            </div>
            <div class="ramp-preview" id="rampPreview"></div>
        </div>
    </div>

    <button class="start-btn" id="startBtn">Start</button>

<script>
    let bpm = 120;
    let isRunning = false;
    let audioCtx = null;
    let currentSound = 'click';
    let tapTimes = [];

    // Time signature & subdivision
    let beatsPerMeasure = 4;   // how many main beats before the accent repeats
    let subdivision = 1;       // equal clicks per beat: 1=quarter, 2=eighths, 3=triplets, 4=sixteenths
    let accentEnabled = true;  // whether beat 1 gets a distinct, louder click

    // Lookahead scheduler state — audio events are scheduled ahead of time using
    // the audio clock (ctx.currentTime), not driven directly by setInterval/setTimeout,
    // since JS timers alone drift too much once you're clicking fast subdivisions.
    const SCHEDULE_AHEAD_TIME = 0.1;  // seconds to schedule ahead of the audio clock
    const LOOKAHEAD_INTERVAL = 25;    // ms between scheduler checks
    let currentBeatIndex = 0;
    let currentSubIndex = 0;
    let nextNoteTime = 0.0;
    let schedulerTimerId = null;

    // Tempo ramp
    let rampActive = false;
    let rampTimerId = null;
    let rampStepsRemaining = 0;
    let rampTotalSteps = 0;
    let rampStartBpm = 0;
    let rampTargetBpm = 0;

    function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }

    // type: 'accent' (beat 1 of the measure), 'beat' (any other main beat),
    // or 'sub' (a subdivision click between main beats)
    function playClick(type, time) {
        const ctx = getAudioCtx();
        const gain = ctx.createGain();
        gain.connect(ctx.destination);

        const volMult  = type === 'accent' ? 1.0  : (type === 'beat' ? 0.75 : 0.42);
        const freqMult = type === 'accent' ? 1.35 : (type === 'beat' ? 1.0  : 0.85);

        if (currentSound === 'click') {
            const osc = ctx.createOscillator();
            osc.connect(gain);
            osc.frequency.value = 1000 * freqMult;
            gain.gain.setValueAtTime(0.5 * volMult, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
            osc.start(time); osc.stop(time + 0.04);

        } else if (currentSound === 'wood') {
            const osc = ctx.createOscillator();
            osc.connect(gain);
            osc.type = 'square';
            osc.frequency.value = 400 * freqMult;
            gain.gain.setValueAtTime(0.4 * volMult, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
            osc.start(time); osc.stop(time + 0.06);

        } else if (currentSound === 'hihat') {
            const bufferSize = ctx.sampleRate * 0.08;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const source = ctx.createBufferSource();
            source.buffer = buffer;
            const filter = ctx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 7000 * freqMult;
            source.connect(filter);
            filter.connect(gain);
            gain.gain.setValueAtTime(0.4 * volMult, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
            source.start(time); source.stop(time + 0.08);

        } else if (currentSound === 'beep') {
            const osc = ctx.createOscillator();
            osc.connect(gain);
            osc.type = 'sine';
            osc.frequency.value = 720 * freqMult;
            gain.gain.setValueAtTime(0.35 * volMult, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
            osc.start(time); osc.stop(time + 0.1);
        }
    }

    function scheduleClick(beatIndex, subIndex, time) {
        let type;
        if (subIndex === 0 && beatIndex === 0) type = accentEnabled ? 'accent' : 'beat';
        else if (subIndex === 0) type = 'beat';
        else type = 'sub';
        playClick(type, time);
    }

    function advanceNote() {
        const secondsPerBeat = 60.0 / bpm;
        const secondsPerSub = secondsPerBeat / subdivision;
        nextNoteTime += secondsPerSub;
        currentSubIndex++;
        if (currentSubIndex >= subdivision) {
            currentSubIndex = 0;
            currentBeatIndex++;
            if (currentBeatIndex >= beatsPerMeasure) currentBeatIndex = 0;
        }
    }

    function scheduler() {
        const ctx = getAudioCtx();
        while (nextNoteTime < ctx.currentTime + SCHEDULE_AHEAD_TIME) {
            scheduleClick(currentBeatIndex, currentSubIndex, nextNoteTime);
            advanceNote();
        }
        schedulerTimerId = setTimeout(scheduler, LOOKAHEAD_INTERVAL);
    }

    function setBpm(val) {
        bpm = Math.min(400, Math.max(1, val));
        document.getElementById('bpmNumber').textContent = bpm;
        document.getElementById('bpmSlider').value = bpm;
        // No restart needed — the scheduler reads `bpm` fresh on every note, so a
        // tempo change smoothly takes effect on the next click rather than jumping.
    }

    function setBeatsPerMeasure(n) {
        beatsPerMeasure = n;
        if (currentBeatIndex >= beatsPerMeasure) currentBeatIndex = 0;
    }

    function setSubdivision(n) {
        subdivision = n;
        if (currentSubIndex >= subdivision) currentSubIndex = 0;
    }

    // ── Tempo Ramp ───────────────────────────────────────────────────────────
    // Shared by both the live preview and the actual execution, so there's one
    // source of truth for the math and the two can never drift out of sync.
    function computeRampPlan(startBpm) {
        const target = parseInt(document.getElementById('rampTargetBpm').value, 10);
        const durationMin = parseFloat(document.getElementById('rampDuration').value);
        const stepSize = parseInt(document.getElementById('rampStepSize').value, 10);
        if (isNaN(target) || isNaN(durationMin) || isNaN(stepSize) || durationMin <= 0 || stepSize <= 0) return null;

        const clampedTarget = Math.min(400, Math.max(1, target));
        const totalDelta = clampedTarget - startBpm;
        if (totalDelta === 0) return { startBpm, targetBpm: clampedTarget, numSteps: 0, intervalMs: 0 };

        const numSteps = Math.max(1, Math.round(Math.abs(totalDelta) / stepSize));
        const intervalMs = (durationMin * 60 * 1000) / numSteps;
        return { startBpm, targetBpm: clampedTarget, numSteps, intervalMs };
    }

    function updateRampPreview() {
        const preview = document.getElementById('rampPreview');
        if (!preview || rampActive) return; // don't clobber the live "ramping..." status
        const plan = computeRampPlan(bpm);
        if (!plan) { preview.textContent = ''; return; }
        if (plan.numSteps === 0) { preview.textContent = 'Already at target \u2014 no ramp needed.'; return; }
        const perStepDelta = (plan.targetBpm - plan.startBpm) / plan.numSteps;
        const direction = perStepDelta > 0 ? 'speeding up' : 'slowing down';
        const stepAbs = Math.abs(perStepDelta).toFixed(1);
        const intervalMinSec = plan.intervalMs / 60000;
        const intervalLabel = intervalMinSec < 1 ? Math.round(intervalMinSec * 60) + 's' : intervalMinSec.toFixed(1) + ' min';
        preview.textContent = `${bpm} \u2192 ${plan.targetBpm} BPM, ${direction} by ~${stepAbs} BPM every ${intervalLabel} (${plan.numSteps} steps)`;
    }

    function updateRampStatus() {
        const preview = document.getElementById('rampPreview');
        if (!preview) return;
        if (rampActive) {
            const stepsDone = rampTotalSteps - rampStepsRemaining;
            preview.textContent = `Ramping: step ${stepsDone} of ${rampTotalSteps} \u2014 now ${bpm} BPM, target ${rampTargetBpm}`;
        } else {
            updateRampPreview();
        }
    }

    function scheduleNextRampStep(intervalMs) {
        rampTimerId = setTimeout(() => {
            if (!rampActive || !isRunning) return;
            rampStepsRemaining--;
            let nextBpm;
            if (rampStepsRemaining <= 0) {
                nextBpm = rampTargetBpm; // snap exactly to target on the final step, avoiding rounding drift
            } else {
                const stepsCompleted = rampTotalSteps - rampStepsRemaining;
                const perStepDelta = (rampTargetBpm - rampStartBpm) / rampTotalSteps;
                nextBpm = Math.round(rampStartBpm + perStepDelta * stepsCompleted);
            }
            setBpm(nextBpm);
            updateRampStatus();
            if (rampStepsRemaining > 0) {
                scheduleNextRampStep(intervalMs);
            } else {
                rampActive = false;
                updateRampStatus();
            }
        }, intervalMs);
    }

    function startRampIfEnabled() {
        const toggle = document.getElementById('rampToggle');
        if (!toggle || !toggle.checked) return;
        const plan = computeRampPlan(bpm);
        if (!plan || plan.numSteps === 0) return;

        rampActive = true;
        rampTotalSteps = plan.numSteps;
        rampStepsRemaining = plan.numSteps;
        rampStartBpm = plan.startBpm;
        rampTargetBpm = plan.targetBpm;
        scheduleNextRampStep(plan.intervalMs);
        updateRampStatus();
    }

    function stopRamp() {
        rampActive = false;
        if (rampTimerId) clearTimeout(rampTimerId);
        rampTimerId = null;
        updateRampStatus();
    }

    function startMetronome() {
        const ctx = getAudioCtx();
        ctx.resume();
        isRunning = true;
        currentBeatIndex = 0;
        currentSubIndex = 0;
        nextNoteTime = ctx.currentTime + 0.05;
        scheduler();
        startRampIfEnabled();
        document.getElementById('startBtn').textContent = 'Stop';
        document.getElementById('startBtn').classList.add('running');
    }

    function stopMetronome() {
        clearTimeout(schedulerTimerId);
        schedulerTimerId = null;
        isRunning = false;
        stopRamp();
        document.getElementById('startBtn').textContent = 'Start';
        document.getElementById('startBtn').classList.remove('running');
    }

    document.getElementById('bpmSlider').addEventListener('input', e => setBpm(parseInt(e.target.value)));
    document.getElementById('nudgeUp').onclick = () => setBpm(bpm + 1);
    document.getElementById('nudgeDown').onclick = () => setBpm(bpm - 1);
    document.getElementById('nudgeUp5').onclick = () => setBpm(bpm + 5);
    document.getElementById('nudgeDown5').onclick = () => setBpm(bpm - 5);

    document.getElementById('tapBtn').onclick = () => {
        const now = Date.now();
        tapTimes.push(now);
        if (tapTimes.length > 8) tapTimes.shift();
        if (tapTimes.length > 1) {
            if (now - tapTimes[0] > 3000) tapTimes = tapTimes.slice(-2);
            const intervals = [];
            for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
            const avg = intervals.reduce((a,b) => a+b, 0) / intervals.length;
            setBpm(Math.round(60000 / avg));
        }
    };

    document.querySelectorAll('.sound-btn').forEach(btn => {
        btn.onclick = () => {
            currentSound = btn.dataset.sound;
            document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
    });

    document.getElementById('timeSigOptions').querySelectorAll('.pill-btn').forEach(btn => {
        btn.onclick = () => {
            setBeatsPerMeasure(parseInt(btn.dataset.beats));
            setSubdivision(parseInt(btn.dataset.subdiv));
            document.getElementById('timeSigOptions').querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            syncSubdivButtons();
        };
    });

    document.getElementById('subdivOptions').querySelectorAll('.pill-btn').forEach(btn => {
        btn.onclick = () => {
            setSubdivision(parseInt(btn.dataset.subdiv));
            syncSubdivButtons();
            // Once subdivision is changed independently, no time-signature preset
            // necessarily matches anymore — clear their active state unless one still does.
            syncTimeSigButtons();
        };
    });

    function syncSubdivButtons() {
        document.getElementById('subdivOptions').querySelectorAll('.pill-btn').forEach(b => {
            b.classList.toggle('active', parseInt(b.dataset.subdiv) === subdivision);
        });
    }

    function syncTimeSigButtons() {
        document.getElementById('timeSigOptions').querySelectorAll('.pill-btn').forEach(b => {
            const matches = parseInt(b.dataset.beats) === beatsPerMeasure && parseInt(b.dataset.subdiv) === subdivision;
            b.classList.toggle('active', matches);
        });
    }

    document.getElementById('accentToggle').onchange = e => { accentEnabled = e.target.checked; };

    document.getElementById('rampToggle').onchange = e => {
        document.getElementById('rampControls').style.display = e.target.checked ? 'block' : 'none';
        if (e.target.checked) updateRampPreview();
    };
    ['rampTargetBpm', 'rampDuration', 'rampStepSize'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateRampPreview);
    });

    document.getElementById('startBtn').onclick = () => {
        isRunning ? stopMetronome() : startMetronome();
    };

    // URL params
    (function() {
        const params = new URLSearchParams(window.location.search);
        const bpmParam = params.get('bpm');
        if (bpmParam) setBpm(parseInt(bpmParam));
        const soundParam = params.get('sound');
        if (soundParam) {
            currentSound = soundParam;
            document.querySelectorAll('.sound-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.sound === soundParam);
            });
        }
        const beatsParam = params.get('beats');
        const subdivParam = params.get('subdiv');
        if (beatsParam) setBeatsPerMeasure(parseInt(beatsParam));
        if (subdivParam) setSubdivision(parseInt(subdivParam));
        if (beatsParam || subdivParam) { syncSubdivButtons(); syncTimeSigButtons(); }
        const accentParam = params.get('accent');
        if (accentParam === 'false') {
            accentEnabled = false;
            document.getElementById('accentToggle').checked = false;
        }
        const rampTargetParam = params.get('rampTarget');
        const rampMinutesParam = params.get('rampMinutes');
        if (rampTargetParam && rampMinutesParam) {
            document.getElementById('rampTargetBpm').value = rampTargetParam;
            document.getElementById('rampDuration').value = rampMinutesParam;
            const rampStepParam = params.get('rampStep');
            if (rampStepParam) document.getElementById('rampStepSize').value = rampStepParam;
            document.getElementById('rampToggle').checked = true;
            document.getElementById('rampControls').style.display = 'block';
            updateRampPreview();
        }
    })();
</script>
</body>
</html>
